name: release
# Tag-triggered image build pushed to GHCR (public package — this repo is
# public, so cluster pulls need no imagePullSecret). amd64 only: the minipc
# is amd64 and nothing schedules playout onto the Pi 5.
on:
  push:
    tags:
      - v*
  # release-please.yml dispatches this at the tag ref it just created — its
  # GITHUB_TOKEN-pushed tag can't fire the push trigger above.
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/adanalife/playout
          flavor: latest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            SHA=${{ github.sha }}
          push: true
          cache-from: type=gha,scope=playout
          cache-to: type=gha,mode=max,scope=playout

  notify:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Discord notification
        uses: Ilshidur/action-discord@0.4.0
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION_TAG: ${{ github.ref_name }}
        with:
          # Link the tagged CHANGELOG.md, not a payload `compare` URL: releases
          # dispatch via workflow_dispatch, whose event payload has no `compare`.
          args: 'New Docker image released for [{{ EVENT_PAYLOAD.repository.full_name }}]({{ EVENT_PAYLOAD.repository.html_url }}): [{{ VERSION_TAG }}]({{ EVENT_PAYLOAD.repository.html_url }}/blob/{{ VERSION_TAG }}/CHANGELOG.md)'
