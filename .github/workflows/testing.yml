name: testing

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      # mise installs rust via rustup with a minimal profile; clippy is a
      # separate component (and the mise cache can hold a component-less
      # toolchain, so an env-var profile override is not enough).
      - run: rustup component add clippy
      - uses: Swatinem/rust-cache@v2
      # -ugly (x264enc), -libav (h264 decode), -rtsp (rtspclientsink), and
      # -tools (gst-launch, clip generation) are for the behavior harness.
      - name: Install GStreamer
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly gstreamer1.0-libav \
            gstreamer1.0-rtsp gstreamer1.0-tools
      # Real MediaMTX + NATS for tests/behavior.rs — the tests skip when these
      # are missing, so keep them installed or the harness silently no-ops.
      - name: Install MediaMTX and NATS server
        run: |
          curl -fsSL https://github.com/bluenviron/mediamtx/releases/download/v1.19.2/mediamtx_v1.19.2_linux_amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin mediamtx
          curl -fsSL https://github.com/nats-io/nats-server/releases/download/v2.14.3/nats-server-v2.14.3-linux-amd64.tar.gz \
            | sudo tar -xz --strip-components=1 -C /usr/local/bin nats-server-v2.14.3-linux-amd64/nats-server
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
