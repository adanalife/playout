name: dev-image
# Floating :main image on every main push — what stage-1 deploys
# (imagePullPolicy: Always picks up rebuilds under the tag). amd64 only,
# same rationale as release.yml.
on:
  push:
    branches:
      - main

# Only build the newest main merge: two close-together pushes would race to
# tag :main and the older build finishing last would clobber it. (release.yml
# is deliberately NOT guarded: cancelling could drop a version; immutable
# per-version tags are safe.)
concurrency:
  group: dev-image
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          tags: ghcr.io/adanalife/playout:main
          push: true
          cache-from: type=gha,scope=playout
          cache-to: type=gha,mode=max,scope=playout
