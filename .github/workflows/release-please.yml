name: release-please
# Trunk-based release flow: release-please maintains a standing release PR on
# main — the next version + prod pin, computed from the conventional commits
# since the last release. `skip-changelog` is set because this repo keeps
# towncrier: the "Build changelog" step below collates the changelog.d/
# fragments into CHANGELOG.md on the release PR branch, so the built changelog
# lands atomically with the version bump when the PR squash-merges. (The prod
# dist needs no re-synth here — release-please rewrites cdk8s/versions.yaml and
# the committed dist directly via extra-files.)
#
# Merging the release PR creates the vX.Y.Z tag + GitHub Release; release.yml is
# then dispatched explicitly at that tag because GITHUB_TOKEN-created tags don't
# fire push triggers.
on:
  push:
    branches:
      - main

permissions:
  contents: write # tag + GitHub Release + release-PR branch
  pull-requests: write # open/update the release PR
  actions: write # dispatch release.yml

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # On the standing-release-PR run (not the release-created run), stage the
      # towncrier changelog onto the PR branch. Pushed with the automation app
      # token so the push fires the PR's pull_request events (CI gates re-run
      # against the final release state); a GITHUB_TOKEN push wouldn't, and the
      # required checks would then hang as "Expected". release-please recreates
      # this branch from main on every push, so this rebuild is idempotent.
      - name: Mint automation app token
        if: ${{ steps.release.outputs.pr && !steps.release.outputs.release_created }}
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.AUTOMATION_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_APP_PRIVATE_KEY }}

      - name: Check out the release PR branch
        if: ${{ steps.release.outputs.pr && !steps.release.outputs.release_created }}
        uses: actions/checkout@v7
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: astral-sh/setup-uv@v7
        if: ${{ steps.release.outputs.pr && !steps.release.outputs.release_created }}

      - name: Build changelog on the release PR branch
        if: ${{ steps.release.outputs.pr && !steps.release.outputs.release_created }}
        run: |
          set -euo pipefail
          # release-please bumped Cargo.toml on this branch — the version is
          # the single source of truth for both the changelog and the cut tag.
          VERSION=$(grep -m1 -oE '^version = "[^"]+"' Cargo.toml | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "Release version: $VERSION"

          # Collate the towncrier fragments (if any) into CHANGELOG.md + delete
          # them. A release PR can exist with no fragments (a fix: whose entry
          # was skip-changelog'd) — that's not an error, just no changelog
          # stanza. The commit is allowed to be empty because the push itself is
          # load-bearing: it's what fires the PR's CI checks.
          if compgen -G "changelog.d/*.md" > /dev/null; then
            uvx towncrier build --yes --config towncrier.toml --version "$VERSION"
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit --allow-empty -m "chore: build changelog for $VERSION"
          git push origin HEAD:${{ fromJSON(steps.release.outputs.pr).headBranchName }}

      - name: Dispatch release workflow at the new tag
        if: ${{ steps.release.outputs.release_created }}
        run: gh workflow run release.yml --repo "$GITHUB_REPOSITORY" --ref "${{ steps.release.outputs.tag_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
