name: release-please
# Trunk-based release flow: release-please maintains a standing release PR on
# main (version + CHANGELOG computed from conventional commits). Merging that
# PR creates the vX.Y.Z tag + GitHub Release. When this repo ships a container
# image, a release.yml dispatched at the tag goes here (GITHUB_TOKEN-created
# tags don't fire push triggers).
on:
  push:
    branches:
      - main

permissions:
  contents: write # tag + GitHub Release + release-PR branch
  pull-requests: write # open/update the release PR

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
