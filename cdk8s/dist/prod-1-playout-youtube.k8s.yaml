apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app: playout-youtube
    app.kubernetes.io/instance: playout-youtube
    app.kubernetes.io/name: playout
    app.kubernetes.io/part-of: tripbot
  name: playout-youtube-config
  namespace: prod-1
data:
  VIDEO_DIR: /opt/data/Dashcam/_all
  OUTPUT: rtsp
  ENCODER: passthrough
  RTSP_URL: rtsp://mediamtx-youtube:8554/dashcam
  NATS_URL: nats://nats.prod-1-platform.svc.cluster.local:4222
  ENV: production
  STREAM_PLATFORM: youtube
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: playout-youtube
    app.kubernetes.io/instance: playout-youtube
    app.kubernetes.io/name: playout
    app.kubernetes.io/part-of: tripbot
  name: playout-youtube
  namespace: prod-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: playout-youtube
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: playout-youtube
        app.kubernetes.io/name: playout
        app.kubernetes.io/instance: playout-youtube
        app.kubernetes.io/part-of: tripbot
      annotations:
        adanalife.dev/config-hash: a6cd1704b6
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: playout
          image: ghcr.io/adanalife/playout:0.10.0 # x-release-please-version
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: playout-youtube-config
            - secretRef:
                name: sentry-playout
                optional: true
            - secretRef:
                name: grafana-cloud-otlp
                optional: true
          volumeMounts:
            - name: dashcam
              mountPath: /opt/data/Dashcam/_all
              readOnly: true
          resources:
            requests:
              cpu: "2"
              memory: 512Mi
            limits:
              memory: 4Gi
          ports:
            - name: http
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 10
      volumes:
        - name: dashcam
          persistentVolumeClaim:
            claimName: vlc-dashcam-local
            readOnly: true
      priorityClassName: prod-stream
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: playout-youtube
    app.kubernetes.io/instance: playout-youtube
    app.kubernetes.io/name: playout
    app.kubernetes.io/part-of: tripbot
  name: playout-youtube
  namespace: prod-1
spec:
  selector:
    app: playout-youtube
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  labels:
    app.kubernetes.io/part-of: tripbot
  name: sentry-playout
  namespace: prod-1
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameterstore
    kind: SecretStore
  target:
    name: sentry-playout
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /k8s/sentry-playout
