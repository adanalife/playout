apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app: playout-youtube
    app.kubernetes.io/instance: playout-youtube
    app.kubernetes.io/name: playout
    app.kubernetes.io/part-of: tripbot
  name: playout-youtube-config
  namespace: prod-1
data:
  VIDEO_DIR: /opt/data/Dashcam/_all
  OUTPUT: rtsp
  ENCODER: vah264enc
  RTSP_URL: rtsp://mediamtx-youtube:8554/dashcam
  NATS_URL: nats://nats.prod-1-platform.svc.cluster.local:4222
  ENV: production
  STREAM_PLATFORM: youtube
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: playout-youtube
    app.kubernetes.io/instance: playout-youtube
    app.kubernetes.io/name: playout
    app.kubernetes.io/part-of: tripbot
  name: playout-youtube
  namespace: prod-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: playout-youtube
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: playout-youtube
        app.kubernetes.io/name: playout
        app.kubernetes.io/instance: playout-youtube
        app.kubernetes.io/part-of: tripbot
      annotations:
        adanalife.dev/config-hash: e58e936087
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: playout
          image: ghcr.io/adanalife/playout:0.2.0 # x-release-please-version
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: playout-youtube-config
          volumeMounts:
            - name: dashcam
              mountPath: /opt/data/Dashcam/_all
              readOnly: true
          resources:
            requests:
              cpu: "2"
              memory: 512Mi
              gpu.intel.com/i915: "1"
            limits:
              memory: 4Gi
              gpu.intel.com/i915: "1"
      volumes:
        - name: dashcam
          persistentVolumeClaim:
            claimName: vlc-dashcam-local
            readOnly: true
      priorityClassName: prod-stream
